<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Voter Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>

<body>

<h2>Voter Panel</h2>

<button onclick="connectWallet()">Connect Wallet</button>

<hr/>

<h3>Select Election</h3>
<select id="electionSelect"></select>
<button onclick="loadElections()">Load Elections</button>

<hr/>

<h3>Enter Aadhaar</h3>
<input id="voterIdInput" placeholder="Enter Aadhaar"/>
<button onclick="sendOtp()">Send OTP</button>

<hr/>

<h3>Verify OTP</h3>
<input id="otpInput" placeholder="Enter OTP"/>
<button onclick="verifyAndRegister()">Verify & Register</button>

<p id="timer" style="color:red;"></p>

<hr/>

<h3>Candidates</h3>
<button onclick="loadCandidates()">Load Candidates</button>
<ul id="candidateList"></ul>

<pre id="output"></pre>

<script>

const BASE_URL = "http://localhost:3000";

let provider, signer, contract;
let storedEmail = "";
let otpTimerInterval = null;
let timeLeft = 30;

const contractAddress = "0xBF92840DB7078b5864e92E2187fAE47574548bC9";

const abi = [
  "function getElectionCount() view returns(uint)",
  "function getElection(uint) view returns(string,uint,uint)",
  "function getCandidateCount(uint) view returns(uint)",
  "function getCandidate(uint,uint) view returns(string,uint)",
  "function vote(uint,uint)",
  "function register(uint,bytes32)",
  "function isRegistered(uint,address) view returns(bool)"
];

// ======================
async function connectWallet(){
  await window.ethereum.request({ method:"eth_requestAccounts" });
  provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();
  contract = new ethers.Contract(contractAddress, abi, signer);
  output("✅ Wallet connected");
}

// ======================
function startTimer(){
  clearInterval(otpTimerInterval);
  timeLeft = 30;

  otpTimerInterval = setInterval(() => {
    document.getElementById("timer").innerText =
      `⏳ OTP expires in ${timeLeft}s`;

    timeLeft--;

    if(timeLeft < 0){
      clearInterval(otpTimerInterval);
      document.getElementById("timer").innerText =
        "❌ OTP expired. Request again.";
    }
  }, 1000);
}

// ======================
async function sendOtp(){
  const aadhaar = document.getElementById("voterIdInput").value.trim();

  const res = await fetch(`${BASE_URL}/send-otp`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ aadhaar })
  });

  const data = await res.json();

  if(!data.success){
    return output("❌ " + data.message);
  }

  storedEmail = data.email;

  output("📩 OTP sent");
  startTimer(); // 🔥 START COUNTDOWN
}

// ======================
async function verifyAndRegister(){
  const aadhaar = document.getElementById("voterIdInput").value.trim();
  const otp = document.getElementById("otpInput").value.trim();
  const electionId = document.getElementById("electionSelect").value;

  if(timeLeft <= 0){
    return output("❌ OTP expired");
  }

  const wallet = await signer.getAddress();

  const res = await fetch(`${BASE_URL}/verify-otp`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: storedEmail,
      token: otp,
      aadhaar,
      wallet
    })
  });

  const data = await res.json();

  if(!data.success){
    return output("❌ " + data.message);
  }

  const hashed = ethers.keccak256(ethers.toUtf8Bytes(aadhaar));

  const already = await contract.isRegistered(electionId, wallet);

  if(already){
    return output("⚠️ Already registered, you can vote");
  }

  const tx = await contract.register(electionId, hashed);
  await tx.wait();

  output("✅ Registered");
}

// ======================
async function loadElections(){
  if(!contract) await connectWallet();

  const count = await contract.getElectionCount();
  const select = document.getElementById("electionSelect");
  select.innerHTML = "";

  for(let i=0;i<count;i++){
    const e = await contract.getElection(i);
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = `${i} - ${e[0]}`;
    select.appendChild(opt);
  }
}

// ======================
async function loadCandidates(){
  const id = document.getElementById("electionSelect").value;
  const list = document.getElementById("candidateList");
  list.innerHTML = "";

  const count = await contract.getCandidateCount(id);

  for(let i=0;i<count;i++){
    const c = await contract.getCandidate(id,i);

    const li = document.createElement("li");
    li.innerHTML = `
      ${c[0]} | Votes: ${c[1]} 
      <button onclick="vote(${id},${i})">Vote</button>
    `;
    list.appendChild(li);
  }
}

// ======================
async function vote(electionId, candidateId){
  try{
    const tx = await contract.vote(electionId, candidateId);
    await tx.wait();
    output("✅ Vote successful");
  }catch(err){
    output("❌ " + (err.reason || "Voting failed"));
  }
}

// ======================
function output(msg){
  document.getElementById("output").innerText = msg;
}

</script>

</body>
</html>
