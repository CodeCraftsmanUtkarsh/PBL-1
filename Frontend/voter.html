<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Voter Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>

<body>

<h2>Voter Panel</h2>
<button onclick="connectWallet()">Connect Wallet</button>

<hr/>

<h3>Select Election</h3>
<select id="electionSelect"></select>
<button onclick="loadElections()">Refresh Elections</button>

<hr/>

<h3>Register with Voter ID</h3>
<input id="voterIdInput" placeholder="Enter your Voter ID"/>
<button onclick="register()">Register</button>

<hr/>

<h3>Candidates</h3>
<button onclick="loadCandidates()">Load Candidates</button>
<ul id="candidateList"></ul>

<pre id="output"></pre>

<script>

let provider;
let signer;
let contract;

const contractAddress = "0xe2eFfe9AE20527e521356D7380cB70f841d6DC14";

const abi = [
  "function getElectionCount() view returns(uint)",
  "function getElection(uint) view returns(string,uint,uint)",
  "function getCandidateCount(uint) view returns(uint)",
  "function getCandidate(uint,uint) view returns(string,uint)",
  "function vote(uint,uint)",
  "function register(uint,bytes32)",
  "function isWhitelisted(uint,bytes32) view returns(bool)",
  "function isRegistered(uint,address) view returns(bool)"
];

async function connectWallet(){
  await window.ethereum.request({ method:"eth_requestAccounts" });
  provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();
  contract = new ethers.Contract(contractAddress, abi, signer);
  output("Wallet connected");
}

async function register(){
  try{
    const id = document.getElementById("voterIdInput").value.trim();
    const electionId = document.getElementById("electionSelect").value;

    if(id === "") return alert("Enter Voter ID");

    const hashed = ethers.keccak256(ethers.toUtf8Bytes(id));

    // 🔥 PRE-CHECK 1: WHITELIST
    const isValid = await contract.isWhitelisted(electionId, hashed);
    if(!isValid){
      return output("❌ This Voter ID is not whitelisted for this election");
    }

    // 🔥 PRE-CHECK 2: ALREADY REGISTERED
    const user = await signer.getAddress();
    const already = await contract.isRegistered(electionId, user);

    if(already){
      return output("⚠️ You are already registered for this election");
    }

    const tx = await contract.register(electionId, hashed);
    await tx.wait();

    output("✅ Registered successfully");

  }catch(err){
    console.error(err);
    output("❌ Registration failed");
  }
}

async function loadElections(){
  const count = await contract.getElectionCount();
  const select = document.getElementById("electionSelect");
  select.innerHTML="";

  for(let i=0;i<count;i++){
    const e = await contract.getElection(i);
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = e[0];
    select.appendChild(opt);
  }
}

async function loadCandidates(){
  const id = document.getElementById("electionSelect").value;
  const list = document.getElementById("candidateList");
  list.innerHTML="";

  const count = await contract.getCandidateCount(id);

  for(let i=0;i<count;i++){
    const c = await contract.getCandidate(id,i);

    const li = document.createElement("li");
    li.innerHTML = `${c[0]} | Votes: ${c[1]} 
      <button onclick="vote(${id},${i})">Vote</button>`;

    list.appendChild(li);
  }
}

async function vote(electionId, candidateId){
  try{

    // 🔥 CHECK ELECTION ACTIVE
    const e = await contract.getElection(electionId);
    const now = Math.floor(Date.now()/1000);

    if(now < Number(e[1]) || now > Number(e[2])){
      return output("⏳ Election is not active");
    }

    // 🔥 CHECK REGISTERED
    const user = await signer.getAddress();
    const isReg = await contract.isRegistered(electionId, user);

    if(!isReg){
      return output("❌ You are not registered for this election");
    }

    const tx = await contract.vote(electionId, candidateId);
    await tx.wait();

    output("✅ Vote successful");

  }catch(err){
    console.error(err);
    output("❌ Voting failed");
  }
}

function output(msg){
  document.getElementById("output").innerText = msg;
}
</script>

</body>
</html>
