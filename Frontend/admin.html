<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>

<body>

<h2>Admin Panel</h2>
<button onclick="connectWallet()">Connect Wallet</button>

<hr/>

<h3>Create Election</h3>
<input id="eName" placeholder="Election name"/>
<input id="start" type="datetime-local"/>
<input id="end" type="datetime-local"/>
<button onclick="createElection()">Create Election</button>

<hr/>

<h3>Select Election</h3>
<select id="electionSelect"></select>
<button onclick="loadElections()">Refresh Elections</button>

<hr/>

<h3>Whitelist Voter ID(s)</h3>
<textarea id="voterIdInput" rows="6" cols="50"
placeholder="Enter Voter IDs (comma or newline separated)"></textarea>
<br><br>
<button onclick="whitelistVoterIds()">Whitelist</button>

<hr/>

<h3>Add Candidate</h3>
<input id="candidate" placeholder="Candidate name"/>
<button onclick="addCandidate()">Add Candidate</button>

<hr/>

<h3>Candidates</h3>
<button onclick="loadCandidates()">Show Candidates</button>
<ul id="candidateList"></ul>

<pre id="output"></pre>

<script>

let provider;
let signer;
let contract;

const contractAddress = "0xBF92840DB7078b5864e92E2187fAE47574548bC9";

const abi = [
  "function createElection(string,uint,uint)",
  "function getElectionCount() view returns(uint)",
  "function getElection(uint) view returns(string,uint,uint)",
  "function addCandidate(uint,string)",
  "function getCandidateCount(uint) view returns(uint)",
  "function getCandidate(uint,uint) view returns(string,uint)",
  "function whitelistVoterId(uint,bytes32)",
  "function whitelistMultipleVoterIds(uint,bytes32[])"
];

// ======================
// WALLET CONNECT
// ======================
async function connectWallet(){
  try{
    await window.ethereum.request({ method:"eth_requestAccounts" });
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    contract = new ethers.Contract(contractAddress, abi, signer);
    output("✅ Wallet connected");
  }catch(err){
    console.error(err);
    output("❌ Wallet connection failed");
  }
}

// ======================
// SAFETY CHECK
// ======================
function requireWallet(){
  if(!contract){
    alert("Connect wallet first");
    return false;
  }
  return true;
}

// ======================
// TIME FIX (UTC)
// ======================
function toTimestamp(value){
  return Math.floor(new Date(value + "Z").getTime()/1000);
}

// ======================
// CREATE ELECTION
// ======================
async function createElection(){

  if(!requireWallet()) return;

  const name = document.getElementById("eName").value.trim();
  const startVal = document.getElementById("start").value;
  const endVal = document.getElementById("end").value;

  if(!name) return alert("Enter election name");
  if(!startVal || !endVal) return alert("Select start & end time");

  const start = toTimestamp(startVal);
  const end = toTimestamp(endVal);

  try{
    const tx = await contract.createElection(name, start, end);
    await tx.wait();

    output("✅ Election created");
    loadElections();

  }catch(err){
    console.error(err);
    output("❌ Error: " + (err.reason || "Transaction failed"));
  }
}

// ======================
// LOAD ELECTIONS
// ======================
async function loadElections(){

  if(!requireWallet()) return;

  try{
    const count = await contract.getElectionCount();
    const select = document.getElementById("electionSelect");

    select.innerHTML = "";

    for(let i=0;i<count;i++){
      const e = await contract.getElection(i);

      const opt = document.createElement("option");
      opt.value = i;
      opt.text = `${i} - ${e[0]}`;
      select.appendChild(opt);
    }

    output("✅ Elections loaded");

  }catch(err){
    console.error(err);
    output("❌ Failed to load elections");
  }
}

// ======================
// ADD CANDIDATE
// ======================
async function addCandidate(){

  if(!requireWallet()) return;

  const electionId = document.getElementById("electionSelect").value;
  const name = document.getElementById("candidate").value.trim();

  if(electionId === "") return alert("Select election");
  if(!name) return alert("Enter candidate name");

  try{
    const tx = await contract.addCandidate(electionId, name);
    await tx.wait();

    output("✅ Candidate added");

  }catch(err){
    console.error(err);
    output("❌ Error: " + (err.reason || "Transaction failed"));
  }
}

// ======================
// LOAD CANDIDATES
// ======================
async function loadCandidates(){

  if(!requireWallet()) return;

  const electionId = document.getElementById("electionSelect").value;

  if(electionId === "") return alert("Select election");

  try{
    const list = document.getElementById("candidateList");
    list.innerHTML = "";

    const count = await contract.getCandidateCount(electionId);

    for(let i=0;i<count;i++){
      const c = await contract.getCandidate(electionId, i);

      const li = document.createElement("li");
      li.innerText = `${c[0]} | Votes: ${c[1]}`;
      list.appendChild(li);
    }

    output("✅ Candidates loaded");

  }catch(err){
    console.error(err);
    output("❌ Failed to load candidates");
  }
}

// ======================
// WHITELIST IDS
// ======================
async function whitelistVoterIds(){

  if(!requireWallet()) return;

  let input = document.getElementById("voterIdInput").value;
  let electionId = document.getElementById("electionSelect").value;

  if(electionId === "") return alert("Select election");
  if(input.trim() === "") return alert("Enter Voter IDs");

  let ids = input.split(/[\n,]+/);
  let hashedArray = [];

  for(let i=0;i<ids.length;i++){
    let clean = ids[i].trim();

    if(clean !== ""){
      let hashed = ethers.keccak256(
        ethers.toUtf8Bytes(clean)
      );
      hashedArray.push(hashed);
    }
  }

  try{

    const batchSize = 25;

    for(let i=0; i<hashedArray.length; i+=batchSize){

      output(`⏳ Processing batch ${Math.floor(i/batchSize)+1}`);

      const batch = hashedArray.slice(i, i+batchSize);

      const tx = await contract.whitelistMultipleVoterIds(electionId, batch);
      await tx.wait();
    }

    output("✅ All voter IDs whitelisted");

  }catch(err){
    console.error(err);
    output("❌ Error: " + (err.reason || "Transaction failed"));
  }
}

// ======================
// OUTPUT
// ======================
function output(msg){
  document.getElementById("output").innerText = msg;
}

// ======================
// AUTO LOAD
// ======================
window.onload = () => {
  output("⚡ Connect wallet to start");
};

</script>

</body>
</html>
